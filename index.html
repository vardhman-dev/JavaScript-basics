        // Q5.Write the code which outputs prime numbers in the interval from 2 to n
        // Algorithm : for every number check if it is prime 
        let num = +prompt("Enter a number")
        
        function isPrime(number){
            let ans = true
            for(let i = 2; i < number; i++){
                if(number % i == 0){
                    ans = false
                    break;
                }
            }
            return ans
        }
        let counter = 2
        while(counter <= num){
            if(isPrime(counter)){
                alert(counter)
            }
            counter++;
        }
