<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript-function-practice</title>
</head>
<body>
    <script>
        // Q1.Write a function called add7 that takes one number and returns that number + 7.
        let num1 = +prompt("Enter a number", 0);

        function add7(num){
            return num + 7;
        }
    
        alert(add7(num1));

        // Q2.Write a function called multiply that takes 2 numbers and returns their product.
        let firstNumber = +prompt("Enter the first number", 0);
        let secondNumber = +prompt("Enter the second number", 0);

        function multiply(num_1, num_2){
            return num_1*num_2;
        }

        alert(multiply(firstNumber, secondNumber));

        // Q3.Write a function called capitalize that takes a string and returns that string with only the first letter capitalized. Make sure that it can take strings that are lowercase, UPPERCASE or BoTh.

        let str1 = prompt("Enter a sring", "abcd");

        function capitalize(str){
            let firstChar = str.at(0).toUpperCase()
            let remainingString = str.substr(1).toLowerCase();
            return firstChar + remainingString; 
        }

        alert(capitalize(str1));

        
    </script>
</body>
</html>
